<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="header">
        <nav class="container">
            <div class="logo" id="nav-logo"></div>
            <div class="nav-links" id="nav-links">
                <!-- Links will be injected here -->
            </div>
            <div class="controls">
                <label class="lang-switch">
                    <input type="checkbox" id="lang-toggle">
                    <span class="slider"></span>
                    <span class="labels" data-on="AR" data-off="EN"></span>
                </label>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero-section"></section>
        <section id="about" class="section"></section>
        <section id="education" class="section"></section>
        <section id="experience" class="section"></section>
        <section id="services" class="section"></section>
        <section id="projects" class="section"></section>
        <section id="contact" class="section"></section>
    </main>

    <footer id="footer">
        <div class="container">
            <p id="footer-text"></p>
            <div class="social-links" id="footer-social"></div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
